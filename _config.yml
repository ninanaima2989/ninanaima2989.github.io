title: "AI, Cybersecurity & Data Science Blog"
description: "Daily insights on AI, Cybersecurity, and Data Science | مدونة يومية حول الذكاء الاصطناعي والأمن السيبراني وعلم البيانات"
baseurl: ""
url: "https://ninanaima2989.github.io"
author: "ninanaima2989"
email: ""

markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

paginate: 10
paginate_path: "/page:num/"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - scripts/
  - .github/
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
