name: 📝 Daily Blog Post Generator

on:
  schedule:
    - cron: '0 12 * * *'      # Every day at 12:00 UTC
  workflow_dispatch:           # Manual trigger button

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ===== Job 1: Generate article and commit =====
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: 🤖 Generate article via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-1.5-flash        # ✅ stable model
          GENERATE_ARABIC: "0"                  # set to "1" if you also want Arabic
        run: python scripts/generate_post.py

      - name: 💾 Commit and push new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts/
          if git diff --staged --quiet; then
            echo "✋ No new posts to commit"
          else
            git commit -m "🤖 Auto-post: $(date -u +'%Y-%m-%d')"
            git push
          fi

  # ===== Job 2: Build Jekyll site =====
  build:
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout (after auto-commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: 🏗️ Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # ===== Job 3: Deploy to GitHub Pages =====
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
